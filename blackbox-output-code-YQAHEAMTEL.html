<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InstaGrowth - Instagram Growth Assistant</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .main-content {
            padding: 40px;
        }

        .input-section {
            background: #f8f9fa;
            padding: 30px;
            border-radius: 15px;
            margin-bottom: 30px;
            text-align: center;
        }

        .input-group {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }

        input, select, button {
            padding: 15px 20px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
        }

        input, select {
            background: white;
            border: 2px solid #e9ecef;
            width: 200px;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #667eea;
        }

        .analyze-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            cursor: pointer;
            font-weight: bold;
            transition: transform 0.3s;
            min-width: 150px;
        }

        .analyze-btn:hover {
            transform: translateY(-2px);
        }

        .results {
            display: none;
        }

        .result-card {
            background: white;
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            border-left: 5px solid #667eea;
        }

        .result-card h3 {
            color: #333;
            margin-bottom: 15px;
            font-size: 1.4em;
        }

        .strategy-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .strategy-item {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 10px;
            border-left: 4px solid #28a745;
        }

        .posting-schedule {
            background: #e3f2fd;
            padding: 20px;
            border-radius: 10px;
            margin-top: 15px;
        }

        .hashtag-suggestions {
            background: #fff3e0;
            padding: 20px;
            border-radius: 10px;
        }

        .loading {
            text-align: center;
            padding: 40px;
            display: none;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @media (max-width: 768px) {
            .input-group {
                flex-direction: column;
                align-items: center;
            }
            
            input, select, .analyze-btn {
                width: 100%;
                max-width: 300px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🚀 InstaGrowth</h1>
            <p>AI-Powered Instagram Growth Assistant</p>
        </div>

        <div class="main-content">
            <div class="input-section">
                <div class="input-group">
                    <input type="text" id="username" placeholder="Your Instagram username" maxlength="30">
                    <select id="niche">
                        <option value="">Select your niche</option>
                        <option value="fitness">Fitness</option>
                        <option value="fashion">Fashion</option>
                        <option value="food">Food</option>
                        <option value="travel">Travel</option>
                        <option value="business">Business</option>
                        <option value="photography">Photography</option>
                        <option value="beauty">Beauty</option>
                        <option value="music">Music</option>
                        <option value="gaming">Gaming</option>
                        <option value="other">Other</option>
                    </select>
                    <button class="analyze-btn" onclick="analyzeProfile()">Analyze Profile</button>
                </div>
                <small style="color: #666;">Enter your public Instagram username (no @ needed)</small>
            </div>

            <div class="loading" id="loading">
                <div class="spinner"></div>
                <p>Analyzing your profile and generating growth strategies...</p>
            </div>

            <div class="results" id="results">
                <div class="result-card">
                    <h3>📊 Profile Analysis</h3>
                    <div id="profileSummary"></div>
                </div>

                <div class="result-card">
                    <h3>⏰ Optimal Posting Schedule</h3>
                    <div id="postingSchedule" class="posting-schedule"></div>
                </div>

                <div class="result-card">
                    <h3>🎯 Content Strategy</h3>
                    <div id="contentStrategy" class="strategy-grid"></div>
                </div>

                <div class="result-card">
                    <h3>🏷️ Hashtag Strategy</h3>
                    <div id="hashtagStrategy" class="hashtag-suggestions"></div>
                </div>

                <div class="result-card">
                    <h3>🚀 30-Day Growth Plan</h3>
                    <div id="growthPlan"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Simulated Instagram data based on common patterns
        const mockProfiles = {
            'example': { followers: 1250, following: 800, posts: 45, avgEngagement: 4.2 },
            'fitnessguru': { followers: 3200, following: 1200, posts: 120, avgEngagement: 6.8 },
            'traveladdict': { followers: 890, following: 650, posts: 78, avgEngagement: 3.1 }
        };

        const nicheStrategies = {
            fitness: ['Workout transformations', 'Before/after photos', 'Quick tips', 'Motivational quotes'],
            fashion: ['OOTD posts', 'Style challenges', 'Trend breakdowns', 'Closet tours'],
            food: ['Recipe reels', 'Food hacks', 'Restaurant reviews', 'Cooking timelapses'],
            travel: ['Hidden gems', 'Travel itineraries', 'Budget tips', 'Drone footage'],
            business: ['Success stories', 'Product demos', 'Tips & tricks', 'Behind the scenes']
        };

        function analyzeProfile() {
            const username = document.getElementById('username').value.trim();
            const niche = document.getElementById('niche').value;

            if (!username) {
                alert('Please enter your Instagram username');
                return;
            }

            showLoading(true);
            setTimeout(() => {
                generateAnalysis(username, niche);
                showLoading(false);
            }, 2000);
        }

        function showLoading(show) {
            document.getElementById('loading').style.display = show ? 'block' : 'none';
            document.getElementById('results').style.display = show ? 'none' : 'block';
        }

        function generateAnalysis(username, niche) {
            const profileData = mockProfiles[username.toLowerCase()] || {
                followers: Math.floor(Math.random() * 5000) + 100,
                following: Math.floor(Math.random() * 2000) + 200,
                posts: Math.floor(Math.random() * 200) + 20,
                avgEngagement: (Math.random() * 3 + 2).toFixed(1)
            };

            // Profile Summary
            document.getElementById('profileSummary').innerHTML = `
                <p><strong>Followers:</strong> ${profileData.followers.toLocaleString()}</p>
                <p><strong>Following:</strong> ${profileData.following.toLocaleString()}</p>
                <p><strong>Posts:</strong> ${profileData.posts}</p>
                <p><strong>Avg Engagement:</strong> ${profileData.avgEngagement}%</p>
                <p><strong>Follow Ratio:</strong> ${((profileData.followers / profileData.following) * 100).toFixed(0)}%</p>
                ${profileData.followers < 1000 ? '<p style="color: #ff6b6b; font-weight: bold;">💡 Growth Potential: HIGH</p>' : ''}
            `;

            // Posting Schedule (based on global Instagram data)
            document.getElementById('postingSchedule').innerHTML = `
                <h4>Best Times to Post (Your Timezone)</h4>
                <div style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-top: 15px;">
                    <div><strong>Monday:</strong> 8AM, 12PM</div>
                    <div><strong>Tuesday:</strong> 9AM, 2PM</div>
                    <div><strong>Wednesday:</strong> 7AM, 11AM</div>
                    <div><strong>Thursday:</strong> 9AM, 12PM</div>
                    <div><strong>Friday:</strong> 5AM, 1PM</div>
                    <div><strong>Weekend:</strong> 11AM</div>
                </div>
                <p style="margin-top: 15px; font-size: 14px; color: #666;">
                    📱 Post Reels: Daily at peak times<br>
                    📸 Feed Posts: 3-4x per week<br>
                    💬 Stories: 5-10 per day
                </p>
            `;

            // Content Strategy
            const strategies = nicheStrategies[niche] || ['Carousel posts', 'Reels with trending audio', 'User-generated content', 'Giveaways'];
            let strategyHTML = '';
            strategies.forEach((strategy, i) => {
                strategyHTML += `
                    <div class="strategy-item">
                        <h5>${i + 1}. ${strategy}</h5>
                        <p>Expected growth: <strong>+15-30% engagement</strong></p>
                    </div>
                `;
            });
            document.getElementById('contentStrategy').innerHTML = strategyHTML;

            // Hashtag Strategy
            const hashtags = niche ? getNicheHashtags(niche) : ['#instagood', '#photooftheday', '#love', '#instadaily'];
            document.getElementById('hashtagStrategy').innerHTML = `
                <h4>Top Hashtags for ${niche || 'your niche'}</h4>
                <div style="display: flex; flex-wrap: wrap; gap: 8px; margin-top: 15px;">
                    ${hashtags.slice(0, 12).map(tag => `<span style="background: #ffd700; padding: 5px 12px; border-radius: 20px; font-size: 14px; font-weight: bold;">${tag}</span>`).join('')}
                </div>
                <p style="margin-top: 15px; font-size: 14px; color: #666;">
                    💡 Use 5-11 hashtags per post. Mix popular (1M+) with niche tags (10k-100k posts).
                </p>
            `;

            // Growth Plan
            document.getElementById('growthPlan').innerHTML = `
                <div style="background: linear-gradient(135deg, #28a745, #20c997); color: white; padding: 20px; border-radius: 10px; text-align: center;">
                    <h4>🎯 Expected Results</h4>
                    <p><strong>${profileData.followers < 1000 ? '+200-500 followers' : '+500-1500 followers'}</strong> in 30 days</p>
                </div>
                <div style="margin-top: 20px;">
                    <h5>Week 1: Foundation</h5>
                    <ul style="margin: 10px 0;">
                        <li>Optimize bio + profile pic</li>
                        <li>Post 1 Reel daily</li>
                        <li>Engage with 50 accounts/day</li>
                    </ul>
                    <h5>Week 2-4: Growth</h5>
                    <ul style="margin: 10px 0;">
                        <li>Collaborate with 2-3 creators</li>
                        <li>Run 1 giveaway</li>
                        <li>Analyze top posts & double down</li>
                    </ul>
                </div>
            `;
        }

        function getNicheHashtags(niche) {
            const hashtags = {
                fitness: ['#fitnessmotivation', '#workout', '#fitlife', '#gym', '#fitnessjourney'],
                fashion: ['#ootd', '#fashion', '#style', '#fashionblogger', '#outfit'],
                food: ['#foodie', '#foodporn', '#delicious', '#foodphotography', '#yummy'],
                travel: ['#travelgram', '#wanderlust', '#travel', '#adventure', '#explore'],
                business: ['#entrepreneur', '#business', '#success', '#motivation', '#hustle']
            };
            return hashtags[niche] || [];
        }

        // Auto-analyze on Enter key
        document.getElementById('username').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                analyzeProfile();
            }
        });

        // Example demo
        document.getElementById('username').value = 'example';
    </script>
</body>
</html>
