  <!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>غرفتي المشفرة | Private Cloud Chat</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <style>
        :root { --bg: #0b141a; --panel: #111b21; --primary: #00a884; --text: #e9edef; --incoming: #202c33; --outgoing: #005c4b; }
        * { box-sizing: border-box; font-family: 'Cairo', sans-serif; }
        body { background: var(--bg); color: var(--text); margin: 0; display: flex; justify-content: center; height: 100vh; }
        
        .container { width: 100%; max-width: 500px; display: flex; flex-direction: column; background: var(--panel); border: 1px solid #222; }
        .header { padding: 15px; background: #202c33; text-align: center; border-bottom: 2px solid var(--primary); box-shadow: 0 2px 5px rgba(0,0,0,0.3); }
        .header h2 { margin: 0; font-size: 1.1rem; color: var(--primary); }
        
        .key-bar { padding: 10px 15px; background: #182229; border-bottom: 1px solid #2a3942; display: flex; align-items: center; gap: 10px; }
        .key-bar input { flex: 1; background: #2a3942; border: 1px solid #3b4a54; color: white; padding: 8px; border-radius: 6px; font-size: 0.8rem; }

        .chat-window { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); background-blend-mode: overlay; background-color: rgba(11,20,26,0.9); }
        
        .msg { padding: 10px 15px; border-radius: 10px; font-size: 0.95rem; max-width: 85%; position: relative; word-wrap: break-word; }
        .msg.received { background: var(--incoming); align-self: flex-start; border-bottom-right-radius: 0; }
        .msg.sent { background: var(--outgoing); align-self: flex-end; border-bottom-left-radius: 0; }
        .msg small { display: block; font-size: 0.7rem; color: #8696a0; margin-bottom: 4px; }

        .input-area { padding: 15px; background: #202c33; display: flex; gap: 10px; align-items: center; }
        input[type="text"] { flex: 1; background: #2a3942; border: none; padding: 12px; border-radius: 10px; color: white; outline: none; }
        .send-btn { background: var(--primary); color: white; border: none; width: 45px; height: 45px; border-radius: 50%; cursor: pointer; font-weight: bold; font-size: 1.2rem; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>

<div class="container">
    <div class="header"><h2>🛡️ نظام التواصل المشفر</h2></div>
    
    <div class="key-bar">
        <label style="font-size: 0.7rem; color: #8696a0;">مفتاح التشفير:</label>
        <input type="password" id="secretKey" placeholder="أدخل كلمة السر المشتركة...">
    </div>

    <div class="chat-window" id="chatWindow">
        <div class="msg received"><small>النظام</small>أدخل مفتاح التشفير لبدء قراءة الرسائل من Google Sheets.</div>
    </div>

    <div class="input-area">
        <input type="text" id="userInput" placeholder="اكتب رسالة سرية...">
        <button class="send-btn" onclick="sendMessage()">➤</button>
    </div>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbza145-w4D_hAjaHCYNnBtm5HI9svDIq47k-iBxGdubA2p6PqJBTNj8WnFaLF5x2tC4ag/exec";

    // إرسال الرسالة
    async function sendMessage() {
        const key = document.getElementById('secretKey').value;
        const text = document.getElementById('userInput').value;
        if (!key || !text) return alert("يرجى إدخال المفتاح والرسالة!");

        // 1. التشفير محلياً
        const encrypted = CryptoJS.AES.encrypt(text, key).toString();

        // 2. الرفع إلى Google Sheets
        try {
            document.getElementById('userInput').value = "جاري الإرسال...";
            await fetch(SCRIPT_URL, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify({ message: encrypted })
            });
            document.getElementById('userInput').value = "";
            refreshChat(); // تحديث فوري
        } catch (e) {
            alert("حدث خطأ في الاتصال بالسحابة.");
        }
    }

    // جلب الرسائل وفك تشفيرها
    async function refreshChat() {
        const key = document.getElementById('secretKey').value;
        const chatWindow = document.getElementById('chatWindow');

        try {
            const response = await fetch(SCRIPT_URL);
            const data = await response.json();

            chatWindow.innerHTML = ""; // مسح القديم
            
            // تخطي العناوين وعرض البيانات
            data.slice(1).forEach((row, index) => {
                let content = "🔐 [رسالة مشفرة]";
                if (key) {
                    try {
                        const bytes = CryptoJS.AES.decrypt(row[1], key);
                        const decrypted = bytes.toString(CryptoJS.enc.Utf8);
                        if (decrypted) content = decrypted;
                    } catch (e) { }
                }

                const msgDiv = document.createElement('div');
                msgDiv.className = `msg ${index % 2 === 0 ? 'sent' : 'received'}`;
                const time = new Date(row[0]).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
                msgDiv.innerHTML = `<small>${time}</small>${content}`;
                chatWindow.appendChild(msgDiv);
            });
            chatWindow.scrollTop = chatWindow.scrollHeight;
        } catch (e) {
            console.log("بانتظار مزامنة البيانات...");
        }
    }

    // تحديث تلقائي كل 7 ثوانٍ
    setInterval(refreshChat, 7000);
</script>

</body>
</html>
    
  </body>
  
</html>
